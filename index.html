            A: { name: "宜人性 (Agreeableness)", desc: "信任、利他" },
            N: { name: "神經質 (Neuroticism)", desc: "敏感、情緒波動" }
        };

        const HOLLAND_LABELS = {
            R: { name: "實做型 (Realistic)", desc: "動手操作、重視具體" },
            I: { name: "研究型 (Investigative)", desc: "思考分析、解決問題" },
            A: { name: "藝術型 (Artistic)", desc: "創新直覺、自我表達" },
            S: { name: "社交型 (Social)", desc: "助人教導、重視關係" },
            E: { name: "企業型 (Enterprising)", desc: "領導說服、追求成就" },
            C: { name: "事務型 (Conventional)", desc: "按部就班、重視精確" }
        };

        const MODULES_MAP = ['disc', 'values', 'outcomes', 'traits', 'enneagram', 'big5', 'holland'];

        // --- UTILS ---
        
        const handleCopyText = (text, onSuccess, onError) => {
            try {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                if (successful) { if (onSuccess) onSuccess(); } 
                else { if (onError) onError(); }
            } catch (err) {
                if (onError) onError();
            }
        };

        const handleSafePrint = (setToast, candidateName) => {
            const printContent = document.getElementById('report-container');
            if (!printContent) return;

            const win = window.open('', '', 'height=842,width=595');
            if (!win) {
                setToast({ show: true, msg: "列印視窗被阻擋，請允許彈跳視窗", type: "error" });
                return;
            }
            
            const reportDate = new Date().toLocaleDateString().replace(/\//g, '-');
            const safeName = candidateName || '未知姓名';
            const docTitle = `性格分析報告 - ${safeName} - ${reportDate}`;
            
            const styles = document.getElementsByTagName('style')[0].innerHTML;
            
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>${docTitle}</title>
                    <style>
                        ${styles}
                        body { padding: 40px; }
                        .no-print { display: none !important; }
                        .print-only { display: block !important; }
                    </style>
                </head>
                <body>
                    ${printContent.innerHTML}
                    <div class="footer" style="margin-top:20px; font-size:12px; color:#666;">Personality Portal Analysis Report • Generated on ${new Date().toLocaleString()}</div>
                    <script>
                    window.onload = function() { window.print(); window.close(); }
                    <\/script>
                </body>
                </html>
            `;
            
            win.document.write(html);
            win.document.close();
        };

        // --- SUB-COMPONENTS ---

        const RadarChart = ({ data, size = 200, color = "#4f46e5" }) => {
            const count = data.length;
            const center = size / 2;
            const radius = (size / 2) - 45;
            const angleStep = (Math.PI * 2) / count;

            const getCoordinates = (value, index, maxVal) => {
                const angle = index * angleStep - Math.PI / 2;
                const r = (value / maxVal) * radius;
                const x = center + r * Math.cos(angle);
                const y = center + r * Math.sin(angle);
                return { x, y };
            };

            const rawMax = Math.max(...data.map((d) => d.value), 1);
            const chartMax = Math.max(rawMax, 5);

            const gridLevels = [0.33, 0.66, 1];
            const gridPolygons = gridLevels.map(level => {
                return data.map((_, i) => {
                const { x, y } = getCoordinates(level * chartMax, i, chartMax); 
                return `${x},${y}`;
                }).join(" ");
            });

            const polygonPoints = data.map((d, i) => {
                const { x, y } = getCoordinates(d.value, i, chartMax);
                return `${x},${y}`;
            }).join(" ");

            const labelPoints = data.map((d, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const r = radius + 25;
                const x = center + r * Math.cos(angle);
                const y = center + r * Math.sin(angle);
                return { x, y, label: d.label };
            });

            return (
                <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="overflow-visible">
                {gridPolygons.map((points, i) => (
                    <polygon key={i} points={points} fill="none" stroke="#e2e8f0" strokeWidth="1" />
                ))}
                {data.map((_, i) => {
                    const { x, y } = getCoordinates(chartMax, i, chartMax);
                    return <line key={i} x1={center} y1={center} x2={x} y2={y} stroke="#e2e8f0" strokeWidth="1" />;
                })}
                <polygon points={polygonPoints} fill={color} fillOpacity="0.2" stroke={color} strokeWidth="2" />
                {data.map((d, i) => {
                    const { x, y } = getCoordinates(d.value, i, chartMax);
                    return <circle key={i} cx={x} cy={y} r="3" fill={color} />;
                })}
                {labelPoints.map((p, i) => (
                    <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" className="text-[11px] fill-slate-500 font-bold" style={{fontSize: '11px'}}>
                    {p.label}
                    </text>
                ))}
                </svg>
            );
        };

        function DiscModule({ onFinish, isLastStep }) {
            const [responses, setResponses] = useState({});
            const isComplete = DISC_QUESTIONS.every(q => responses[q.id]);
            return (
                <div className="space-y-8 animate-fade-in">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請在每一題中，選擇一個最符合您狀況的描述。</div>
                {DISC_QUESTIONS.map((q, i) => (
                    <div key={q.id} className="space-y-4">
                    <h3 className="font-bold text-lg text-slate-800">{i + 1}. {q.q}</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {q.options.map(opt => (
                        <button key={opt.type} onClick={() => setResponses({...responses, [q.id]: opt.type})} className={`text-left p-5 rounded-lg border transition-all font-medium active:scale-[0.98] ${responses[q.id] === opt.type ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white border-gray-200 text-slate-600 hover:bg-gray-50'}`}>{opt.text}</button>
                        ))}
                    </div>
                    </div>
                ))}
                <button onClick={() => { const scores = { D: 0, I: 0, S: 0, C: 0 }; Object.values(responses).forEach(v => scores[v] = (scores[v] || 0) + 1); onFinish(scores); }} disabled={!isComplete} className="w-full btn-prominent mt-8">{isLastStep ? "完成測驗" : "下一步"}</button>
                </div>
            );
        }

        function ValuesModule({ onFinish, isLastStep }) {
            const [phase, setPhase] = useState(1);
            const [top3, setTop3] = useState([]);
            const [idx, setIdx] = useState(0);
            const [pairChoices, setPairChoices] = useState({});

            if (phase === 1) {
                const toggle = (id) => { if (top3.includes(id)) setTop3(top3.filter(x => x !== id)); else if (top3.length < 3) setTop3([...top3, id]); };
                return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">階段一：請閱讀定義，並選出您認為「最重要」的 3 項。</div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {VALUES_DEFINITIONS.map(d => (
                        <div key={d.id} onClick={() => toggle(d.id)} className={`p-5 rounded-lg border cursor-pointer transition-all flex justify-between items-start active:scale-[0.98] ${top3.includes(d.id) ? 'border-slate-800 bg-gray-50 shadow-sm' : 'border-gray-200 hover:bg-gray-50'}`}>
                        <div><div className={`font-bold text-lg ${top3.includes(d.id) ? 'text-slate-900' : 'text-slate-700'}`}>{d.id}</div><div className="text-sm text-slate-500 mt-1">{d.text}</div></div>
                        {top3.includes(d.id) && <CheckCircle className="text-slate-800" />}
                        </div>
                    ))}
                    </div>
                    <button disabled={top3.length !== 3} onClick={() => setPhase(2)} className="w-full btn-prominent mt-4">進入階段二</button>
                </div>
                );
            }
            const pair = VALUES_PAIRS[idx];
            const choose = (val) => {
                const next = { ...pairChoices, [idx]: val };
                setPairChoices(next);
                if (idx < VALUES_PAIRS.length - 1) setTimeout(() => setIdx(idx + 1), 150);
                else { const tally = {}; Object.values(next).forEach(v => tally[v] = (tally[v] || 0) + 1); onFinish(tally); }
            };
            return (
                <div className="max-w-xl mx-auto text-center space-y-8 py-8 animate-fade-in">
                <div className="inline-block px-4 py-1 bg-gray-100 rounded-full text-xs font-bold text-slate-500 tracking-wide">題數 {idx + 1} / {VALUES_PAIRS.length}</div>
                <h3 className="text-2xl font-extrabold text-slate-900">您認為哪一項較符合您的價值觀？</h3>
                <div className="grid grid-cols-1 gap-6">
                    <button onClick={() => choose(pair.A)} className="p-8 border border-gray-200 rounded-lg hover:border-slate-400 hover:bg-gray-50 transition-all text-2xl font-bold text-slate-700 hover:text-slate-900 shadow-sm hover:shadow-md active:scale-95">{pair.A}</button>
                    <div className="text-slate-300 font-bold text-sm tracking-widest">OR</div>
                    <button onClick={() => choose(pair.B)} className="p-8 border border-gray-200 rounded-lg hover:border-slate-400 hover:bg-gray-50 transition-all text-2xl font-bold text-slate-700 hover:text-slate-900 shadow-sm hover:shadow-md active:scale-95">{pair.B}</button>
                </div>
                </div>
            );
        }

        function OutcomesModule({ onFinish, isLastStep }) {
            const [pool, setPool] = useState(OUTCOMES_ITEMS);
            const [ranked, setRanked] = useState([]);

            const add = (item) => { setRanked([...ranked, item]); setPool(pool.filter(i => i.id !== item.id)); };
            const remove = (item) => { 
                 const newPool = [...pool, item].sort((a, b) => parseInt(a.id.substring(1)) - parseInt(b.id.substring(1)));
                 setPool(newPool); 
                 setRanked(ranked.filter(i => i.id !== item.id)); 
            };
            const move = (idx, dir) => {
                if ((dir === -1 && idx === 0) || (dir === 1 && idx === ranked.length - 1)) return;
                const copy = [...ranked]; const temp = copy[idx]; copy[idx] = copy[idx + dir]; copy[idx + dir] = temp; setRanked(copy);
            };

            return (
                <div className="space-y-6 animate-fade-in">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請將左側項目點擊加入右側，並透過箭頭調整排序（越上方越重要）。需完成所有排序。</div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-auto lg:h-[600px]">
                    <div className="bg-gray-50 rounded-lg p-3 sm:p-4 flex flex-col h-[500px] lg:h-full border border-gray-200 shadow-inner">
                    <div className="text-xs font-bold text-slate-400 uppercase tracking-widest text-center mb-3">待選項目 ({pool.length})</div>
                    <div className="overflow-y-auto flex-1 space-y-3 pr-2 custom-scroller">
                        {pool.map(item => (
                        <div key={item.id} onClick={() => add(item)} className="bg-white p-4 rounded-md shadow-sm border border-gray-200 cursor-pointer hover:border-emerald-400 hover:shadow-md transition-all group active:scale-[0.98]">
                            <div className="flex justify-between items-center mb-2">
                            <span className="text-lg font-bold text-slate-800 group-hover:text-emerald-700">{item.term}</span>
                            <Plus size={24} className="text-slate-300 group-hover:text-emerald-500 bg-slate-50 rounded-full p-1"/>
                            </div>
                            <p className="text-sm text-slate-600 leading-relaxed">{item.desc}</p>
                        </div>
                        ))}
                    </div>
                    </div>
                    <div className="bg-white rounded-lg p-3 sm:p-4 flex flex-col h-[500px] lg:h-full border-2 border-slate-100 shadow-lg">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-widest text-center mb-3">您的排序 (Top 1 最重要)</div>
                    <div className="overflow-y-auto flex-1 space-y-2 pr-2 custom-scroller">
                        {ranked.map((item, i) => (
                        <div key={item.id} className="bg-slate-50 p-3 sm:p-4 rounded-md border border-slate-200 flex items-center gap-3 animate-fade-in">
                            <div className={`w-8 h-8 rounded flex items-center justify-center font-bold text-sm shrink-0 ${i < 3 ? 'bg-slate-800 text-white' : 'bg-white text-slate-500 border border-gray-200'}`}>{i + 1}</div>
                            <div className="flex-1">
                            <span className="text-base font-bold text-slate-800 block">{item.term}</span>
                            </div>
                            <div className="flex gap-2 shrink-0">
                                <button onClick={() => move(i, -1)} className="p-2 sm:p-3 bg-white border border-gray-200 shadow-sm rounded-lg text-slate-500 hover:text-slate-800 active:scale-95"><ChevronUp size={20}/></button>
                                <button onClick={() => move(i, 1)} className="p-2 sm:p-3 bg-white border border-gray-200 shadow-sm rounded-lg text-slate-500 hover:text-slate-800 active:scale-95"><ChevronDown size={20}/></button>
                                <button onClick={() => remove(item)} className="p-2 sm:p-3 bg-red-50 border border-red-100 shadow-sm rounded-lg text-red-400 hover:text-red-600 active:scale-95 ml-1"><X size={20}/></button>
                            </div>
                        </div>
                        ))}
                    </div>
                    </div>
                </div>
                <div className="pt-4"><button disabled={pool.length > 0} onClick={() => onFinish(ranked)} className="w-full btn-prominent">{isLastStep ? "完成測驗" : "下一步"}</button></div>
                </div>
            );
        }

        function TraitsModule({ onFinish, isLastStep }) {
            const [checked, setChecked] = useState([]);
            const toggle = (t) => { if (checked.includes(t)) setChecked(checked.filter(x => x !== t)); else setChecked([...checked, t]); };
            return (
                <div className="space-y-8 animate-fade-in">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請勾選您認為您具備的特質。</div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    {TRAITS_LIST.map(t => (
                    <label key={t} className={`flex items-center gap-3 p-5 rounded-lg border cursor-pointer transition-all select-none active:scale-[0.98] ${checked.includes(t) ? 'border-slate-800 bg-gray-50 shadow-sm' : 'border-gray-200 hover:border-slate-300 bg-white'}`}>
                        <input type="checkbox" className="hidden" checked={checked.includes(t)} onChange={() => toggle(t)} />
                        <div className={`w-6 h-6 rounded border flex items-center justify-center transition-colors ${checked.includes(t) ? 'bg-slate-800 border-slate-800' : 'bg-white border-gray-300'}`}>{checked.includes(t) && <CheckCircle size={16} className="text-white" />}</div>
                        <span className={`font-bold text-base ${checked.includes(t) ? 'text-slate-900' : 'text-slate-600'}`}>{t}</span>
                    </label>
                    ))}
                </div>
                <button onClick={() => onFinish(checked)} className="w-full btn-prominent mt-6">{isLastStep ? "完成所有測驗" : "下一步"}</button>
                </div>
            );
        }

        function EnneagramModule({ onFinish, isLastStep }) {
            const [selections, setSelections] = useState({});
            const isComplete = ENNEAGRAM_QUESTIONS.every(q => selections[q.id] !== undefined);
            return (
                <div className="space-y-8 animate-fade-in">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請勾選「是」如果該描述非常符合您，否則勾選「否」。</div>
                <div className="grid grid-cols-1 gap-4">
                    {ENNEAGRAM_QUESTIONS.map((q) => (
                    <div key={q.id} className="p-5 bg-white border border-gray-200 rounded-lg flex flex-col sm:flex-row justify-between sm:items-center gap-4 hover:border-slate-300 transition-colors">
                        <span className="font-bold text-slate-700 text-base leading-relaxed flex-1">{q.text}</span>
                        <div className="flex gap-3 shrink-0">
                        <button onClick={() => setSelections({...selections, [q.id]: 1})} className={`flex-1 sm:flex-none px-8 py-3 rounded-lg font-bold border transition-colors active:scale-95 ${selections[q.id] === 1 ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 border-gray-200 hover:bg-gray-50'}`}>是</button>
                        <button onClick={() => setSelections({...selections, [q.id]: 0})} className={`flex-1 sm:flex-none px-8 py-3 rounded-lg font-bold border transition-colors active:scale-95 ${selections[q.id] === 0 ? 'bg-slate-600 text-white border-slate-600' : 'bg-white text-slate-400 border-gray-200 hover:bg-gray-50'}`}>否</button>
                        </div>
                    </div>
                    ))}
                </div>
                <button onClick={() => {
                    const scores = {};
                    ENNEAGRAM_QUESTIONS.forEach(q => { if(selections[q.id] === 1) scores[q.type] = (scores[q.type] || 0) + 1; });
                    onFinish(scores);
                }} disabled={!isComplete} className="w-full btn-prominent mt-6">{isLastStep ? "完成測驗" : "下一步"}</button>
                </div>
            );
        }

        function BigFiveModule({ onFinish, isLastStep }) {
            const [ratings, setRatings] = useState({});
            const isComplete = BIG5_QUESTIONS.every(q => ratings[q.id]);
            return (
                <div className="space-y-8 animate-fade-in">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請評分以下描述符合您的程度 (1:非常不同意 - 5:非常同意)。</div>
                {BIG5_QUESTIONS.map((q) => (
                    <div key={q.id} className="space-y-3 bg-white p-5 rounded-lg border border-gray-200">
                    <div className="font-bold text-slate-700 text-base">{q.text}</div>
                    <div className="flex justify-between gap-2 sm:gap-4">
                        {[1,2,3,4,5].map(v => (
                        <button key={v} onClick={() => setRatings({...ratings, [q.id]: v})} className={`flex-1 py-4 sm:py-5 rounded-lg font-bold text-lg border transition-all active:scale-95 ${ratings[q.id] === v ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-slate-50 text-slate-500 border-gray-200 hover:bg-gray-100'}`}>{v}</button>
                        ))}
                    </div>
                    </div>
                ))}
                <button onClick={() => {
                    const scores = { O: 0, C: 0, E: 0, A: 0, N: 0 };
                    BIG5_QUESTIONS.forEach(q => {
                    const raw = ratings[q.id];
                    const val = q.rev ? (6 - raw) : raw;
                    scores[q.dim] = (scores[q.dim] || 0) + val;
                    });
                    onFinish(scores);
                }} disabled={!isComplete} className="w-full btn-prominent mt-6">{isLastStep ? "完成測驗" : "下一步"}</button>
                </div>
            );
        }

        function HollandModule({ onFinish, isLastStep }) {
            const [selected, setSelected] = useState([]);
            const toggle = (i) => { if(selected.includes(i)) setSelected(selected.filter(x=>x!==i)); else setSelected([...selected, i]); };
            return (
                <div className="space-y-8 animate-fade-in">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請勾選您感興趣或喜歡的活動 (可多選)。</div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    {HOLLAND_ACTIVITIES.map((act, i) => (
                    <div key={i} onClick={() => toggle(i)} className={`p-5 border rounded-lg cursor-pointer flex items-center justify-between transition-colors active:scale-[0.98] ${selected.includes(i) ? 'border-slate-800 bg-gray-50' : 'border-gray-200 hover:bg-gray-50 bg-white'}`}>
                        <span className={`font-bold text-base ${selected.includes(i) ? 'text-slate-900' : 'text-slate-600'}`}>{act.text}</span>
                        {selected.includes(i) && <CheckCircle className="text-slate-800" size={20}/>}
                    </div>
                    ))}
                </div>
                <button onClick={() => {
                    const scores = { R:0, I:0, A:0, S:0, E:0, C:0 };
                    selected.forEach(i => { const type = HOLLAND_ACTIVITIES[i].type; scores[type]++; });
                    onFinish(scores);
                }} className="w-full btn-prominent mt-6">{isLastStep ? "完成測驗" : "下一步"}</button>
                </div>
            );
        }

        function QuizRunner({ config, candidateInfo, onComplete }) {
            const [step, setStep] = useState(0);
            const [currentAnswers, setCurrentAnswers] = useState({});
            const moduleKey = config.modules[step];
            const isLastStep = step === config.modules.length - 1;

            const handleModuleFinish = (data) => {
                const nextAnswers = { ...currentAnswers, [moduleKey]: data };
                setCurrentAnswers(nextAnswers);
                
                if (!isLastStep) {
                    setStep(prev => prev + 1);
                    window.scrollTo(0, 0);
                } else {
                    onComplete(nextAnswers);
                }
            };

            return (
                <div className="bg-white p-5 sm:p-8 rounded-xl shadow-md border border-gray-200 animate-fade-in max-w-3xl mx-auto">
                <div className="mb-8 pb-4 border-b border-gray-100 flex justify-between items-end">
                    <div>
                    <span className="text-slate-600 font-bold bg-gray-100 px-3 py-1 rounded-full text-xs tracking-wider">STEP {step + 1} / {config.modules.length}</span>
                    <h2 className="text-2xl font-extrabold text-slate-900 mt-3 uppercase tracking-tight">{moduleKey}</h2>
                    </div>
                    <div className="text-right text-xs font-semibold text-slate-400">受測者：{candidateInfo.name}</div>
                </div>

                {moduleKey === 'disc' && <DiscModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                {moduleKey === 'values' && <ValuesModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                {moduleKey === 'outcomes' && <OutcomesModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                {moduleKey === 'traits' && <TraitsModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                {moduleKey === 'enneagram' && <EnneagramModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                {moduleKey === 'big5' && <BigFiveModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                {moduleKey === 'holland' && <HollandModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                </div>
            );
        }

        function ResultDashboard({ answers, config, candidateInfo, showToast, duration }) {
            const [aiReportContent, setAiReportContent] = useState('');
            const [isEditingReport, setIsEditingReport] = useState(true);

            // Helper: Format duration from seconds to MM:SS
            const formatDuration = (secs) => {

                                    <p className="text-xs font-bold mb-2 opacity-80">系統偵測到以下異常因子：</p>
                                    {reliabilityResults.reasons.map((r, i) => (
                                        <div key={i} className="text-sm flex items-start gap-2 font-medium">
                                            <Zap size={14} className="mt-1 shrink-0" />
                                            <span>{r}</span>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-sm font-medium flex items-center gap-2 mt-4 pt-4 border-t border-current border-opacity-10 opacity-80">
                                    <CheckCircle size={16} /> 數據表現一致且作答時間合理，具備極高參考價值。
                                </div>
                            )}
                        </div>
                        <p className="mt-3 text-[10px] text-slate-400 font-bold text-center">本報告由系統演算法自動產生，僅供面試初步篩選參考，不建議作為最終錄取之唯一標準。</p>
                    </section>

                    {/* 8. AI REPORT */}
                    <section className="card page-break-before">
                    <div className="flex items-center justify-between mb-4 border-b border-gray-100 pb-4">
                        <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <Brain size={20} className="text-slate-700"/> 8. AI 深度分析報告
                        </h3>
                        <button 
                        onClick={() => setIsEditingReport(!isEditingReport)}
                        className={`flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-bold transition-colors no-print ${isEditingReport ? 'bg-emerald-100 text-emerald-800' : 'bg-gray-100 text-slate-600 hover:bg-gray-200'}`}
                        >
                        {isEditingReport ? <><Eye size={16}/> 預覽列印模式</> : <><Edit3 size={16}/> 編輯模式</>}
                        </button>
                    </div>
                        
                    {isEditingReport ? (
                        <div className="space-y-3 no-print">
                            <div className="flex justify-between items-end">
                                <p className="text-xs font-bold text-slate-500">💡 提示：請在此貼上 AI 生成的分析報告。</p>
                                <button onClick={handlePaste} className="flex items-center gap-1 text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-md hover:bg-indigo-100 transition-colors active:scale-95 border border-indigo-100">
                                    <Clipboard size={14} /> 一鍵貼上報告
                                </button>
                            </div>
                            <textarea 
                                className="w-full h-96 p-5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-slate-800 outline-none text-slate-700 leading-relaxed font-mono text-sm shadow-inner"
                                placeholder="請將 AI 生成的內容貼上至此... (若「一鍵貼上」按鈕無反應，請在此點擊長按並手動貼上)"
                                value={aiReportContent}
                                onChange={(e) => setAiReportContent(e.target.value)}
                            ></textarea>
                        </div>
                    ) : (
                        <div className="relative group">
                            <div className="absolute top-0 right-0 no-print">
                                <button onClick={handleCopyReport} className="flex items-center gap-1.5 text-xs font-bold text-slate-600 bg-white border border-slate-300 px-3 py-1.5 rounded-md hover:bg-slate-50 transition-colors shadow-sm active:scale-95">
                                    <Copy size={14} /> 複製完整報告
                                </button>
                            </div>
                            <div className="ai-report-content bg-white p-0 text-slate-700 leading-relaxed whitespace-pre-wrap font-sans text-sm sm:text-base mt-2">
                            {aiReportContent || <span className="text-slate-400 italic">（尚未輸入 AI 分析報告）</span>}
                            </div>
                        </div>
                    )}
                    </section>
                </div>

                {/* FOOTER ACTIONS */}
                <div className="fixed bottom-0 left-0 right-0 p-3 sm:p-4 bg-white/95 backdrop-blur border-t border-gray-200 shadow-[0_-10px_30px_rgba(0,0,0,0.08)] z-50 no-print">
                    <div className="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3 sm:gap-4">
                        
                        {/* 左側：AI Prompt 按鈕群 (手機上可橫向滑動) */}
                        <div className="w-full sm:w-auto overflow-x-auto pb-1 sm:pb-0 hide-scrollbar flex items-center gap-2">
                            <button onClick={() => handleCopyText(getInsuranceAgentPrompt(), () => showToast("保險業務分析指令已複製", "success"))} className="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 bg-indigo-50 border border-indigo-100 text-indigo-700 rounded-lg font-bold text-sm hover:bg-indigo-100 transition-colors active:scale-95">
                                <Briefcase size={16}/> 業務潛能分析
                            </button>
                            <button onClick={() => handleCopyText(getCandidatePrompt(), () => showToast("受測者回饋指令已複製", "success"))} className="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-lg font-bold text-sm hover:bg-emerald-100 transition-colors active:scale-95">
                                <User size={16}/> 受測者回饋
                            </button>
                            {/* 新增：可信度報告按鈕 (仍保留 AI 按鈕，但系統已經先判別了) */}
                            <button onClick={() => handleCopyText(getReliabilityPrompt(), () => showToast("詳細可信度 AI 指令已複製", "success"))} className="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 bg-rose-50 border border-rose-100 text-rose-700 rounded-lg font-bold text-sm hover:bg-rose-100 transition-colors active:scale-95">
                                <Activity size={16}/> AI 真實性深度分析
                            </button>
                        </div>

                        {/* 右側：列印按鈕 */}
                        <button onClick={() => { if(isEditingReport) setIsEditingReport(false); setTimeout(() => handleSafePrint(showToast, candidateInfo.name), 100); }} className="w-full sm:w-auto flex-shrink-0 flex items-center justify-center gap-2 px-8 py-3 bg-slate-900 text-white rounded-lg font-bold text-sm hover:bg-slate-800 transition-all shadow-md active:scale-95">
                            <Printer size={18}/> 列印報告
                        </button>

                    </div>
                </div>
                
                {/* 加入隱藏橫向捲動軸的樣式 */}
                <style dangerouslySetInnerHTML={{__html: `
                    .hide-scrollbar::-webkit-scrollbar { display: none; }
                    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
                `}} />

                </div>
            );
        }

        // --- MAIN APPLICATION FOR CAMPUS RECRUITMENT ---
        function PersonalityPortal() {
            const [view, setView] = useState('setup');
            const [toast, setToast] = useState({ show: false, msg: '', type: 'info' });
            
            // 用來計算點擊次數的隱藏彩蛋
            const [secretClicks, setSecretClicks] = useState(0);

            const [modules, setModules] = useState({ 
                disc: true, values: true, outcomes: true, traits: true, 
                enneagram: true, big5: true, holland: true 
            });
            const [candidateInfo, setCandidateInfo] = useState({ name: '', dob: '' });
            
            const [quizConfig, setQuizConfig] = useState(null);
            const [answers, setAnswers] = useState({});
            
            // 測驗計時狀態
            const [quizStartTime, setQuizStartTime] = useState(null);
            const [quizDuration, setQuizDuration] = useState(null);

            const showToast = (msg, type = 'info') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };

            // 處理彩蛋點擊 (連點 5 下直接進入結果頁並載入 Demo 資料)
            const handleSecretClick = () => {
                if (view !== 'setup') return; // 只在首頁有效
                const nextClicks = secretClicks + 1;
                setSecretClicks(nextClicks);
                
                if (nextClicks === 5) {
                    setCandidateInfo({ name: '測試員 DEMO', dob: '1999-01-01' });
                    setQuizConfig({
                        modules: ['disc', 'values', 'outcomes', 'traits', 'enneagram', 'big5', 'holland'],
                        timestamp: Date.now()
                    });
                    setAnswers({
                        disc: { D: 6, I: 3, S: 1, C: 0 },
                        values: { "升遷": 5, "成就感": 8, "待遇": 6, "自主性": 2, "環境": 4, "同事": 3, "自我成長": 7 },
                        outcomes: OUTCOMES_ITEMS.slice(), 
                        traits: TRAITS_LIST.slice(0, 10),
                        enneagram: { "1": 1, "2": 0, "3": 5, "4": 0, "5": 1, "6": 2, "7": 4, "8": 3, "9": 1 },
                        big5: { E: 6, A: 7, C: 8, N: 3, O: 9 },
                        holland: { R: 2, I: 4, A: 5, S: 3, E: 5, C: 1 }
                    });
                    setQuizDuration(425); // 模擬 7分 5秒
                    setView('result');
                    showToast("Demo 測試資料已載入", "success");
                    setSecretClicks(0);
                }

                // 若一秒內沒點擊到下一次，重置次數
                setTimeout(() => {
                    setSecretClicks(prev => Math.max(0, prev - 1));
                }, 1000);
            };

            const handleStartQuiz = () => {
                const activeModules = Object.keys(modules).filter(k => modules[k]);
                if (activeModules.length === 0) {
                    showToast("請至少選擇一個測驗模組", "error");
                    return;
                }
                if (!candidateInfo.name.trim()) {
                    showToast("請輸入求職者姓名", "error");
                    return;
                }
                
                setQuizConfig({ modules: activeModules, timestamp: Date.now() });
                setAnswers({});
                setQuizStartTime(Date.now()); // 記錄開始時間
                setQuizDuration(null);
                setView('quiz');
            };

            const handleReset = () => {
                if(confirm("確定要清除當前資料，開始下一位求職者的測驗嗎？")) {
                    setCandidateInfo({ name: '', dob: '' });
                    setAnswers({});
                    setQuizConfig(null);
                    setQuizStartTime(null);
                    setQuizDuration(null);
                    setView('setup');
                    window.scrollTo(0, 0);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 text-slate-800 font-sans selection:bg-slate-200 selection:text-slate-900" style={{ fontFamily: '"Microsoft JhengHei", "Noto Sans TC", sans-serif' }}>
                
                <header className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm backdrop-blur-md bg-white/95 no-print">
                    <div className="max-w-4xl mx-auto px-4 sm:px-6 h-14 md:h-16 flex items-center justify-between">
                        {/* 加入彩蛋點擊事件 */}
                        <div className="flex items-center gap-2 sm:gap-3 select-none cursor-pointer" onClick={handleSecretClick}>
                            <div className="p-1.5 sm:p-2 rounded-md bg-slate-800 text-white">
                                <Target size={20} className="sm:w-6 sm:h-6" />
                            </div>
                            <div>
                                <h1 className="font-bold text-base sm:text-lg tracking-tight text-slate-900 leading-none mb-0.5">人才潛能評測系統</h1>
                                <span className="text-[9px] sm:text-[10px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded font-bold tracking-wider uppercase">Professional Personality Assessment</span>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            {view === 'result' && (
                                <button onClick={handleReset} className="text-sm font-bold text-slate-600 hover:text-slate-900 transition-colors flex items-center gap-1.5 bg-slate-100 px-4 py-2 rounded-lg active:scale-95 shadow-sm">
                                    <RefreshCw size={16} /> 下一位
                                </button>
                            )}
                        </div>
                    </div>
                </header>

                {toast.show && (
                    <div className={`fixed top-20 right-4 z-50 px-6 py-4 rounded-lg shadow-lg flex items-center gap-3 animate-bounce-in border ${
                    toast.type === 'error' ? 'bg-red-50 text-red-700 border-red-100' : 
                    toast.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 
                    'bg-slate-800 text-white border-slate-700'
                    } no-print`}>
                    {toast.type === 'error' ? <AlertCircle size={20}/> : <CheckCircle size={20}/>}
                    <span className="font-semibold tracking-wide text-sm sm:text-base">{toast.msg}</span>
                    </div>
                )}

                <main className="max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
                    
                    {/* SETUP VIEW: 平板直覺操作面板 */}
                    {view === 'setup' && (
                    <div className="bg-white p-6 sm:p-8 md:p-12 rounded-xl shadow-lg border border-gray-200 max-w-2xl mx-auto animate-fade-in">
                        
                        <h2 className="text-lg font-bold text-slate-700 mb-6 sm:mb-8 text-center bg-slate-50 py-3 rounded-lg border border-slate-100">
                            請設定測驗項目並輸入求職者資料
                        </h2>

                        <div className="mb-8 space-y-4">
                            <div className="flex items-center gap-2 mb-2 text-slate-800 font-bold"><User size={18}/> 受測者資料</div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <input type="text" value={candidateInfo.name} onChange={(e) => setCandidateInfo({...candidateInfo, name: e.target.value})} autoComplete="off" className="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none transition-all text-lg font-bold placeholder:font-normal bg-gray-50 focus:bg-white" placeholder="請輸入姓名 (必填)" />
                                </div>
                                <div>
                                    <input type="date" value={candidateInfo.dob} onChange={(e) => setCandidateInfo({...candidateInfo, dob: e.target.value})} autoComplete="off" className="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none transition-all text-slate-600 bg-gray-50 focus:bg-white" />
                                </div>
                            </div>
                        </div>

                        <div className="mb-10">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-2 text-slate-800 font-bold"><List size={18}/> 測驗項目</div>
                                <button onClick={() => setModules({disc: true, values: true, outcomes: true, traits: true, enneagram: true, big5: true, holland: true})} className="text-sm text-indigo-600 hover:text-indigo-800 font-bold px-3 py-1.5 rounded-md hover:bg-indigo-50 transition-colors active:scale-95">全選</button>
                            </div>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                                {[
                                { id: 'disc', label: '1. DISC 行為風格', sub: '溝通與行事作風' },
                                { id: 'values', label: '2. 工作價值觀', sub: '找尋核心在乎事物' },
                                { id: 'outcomes', label: '3. Outcomes 驅動力', sub: '深層心理動機' },
                                { id: 'traits', label: '4. 成功特質檢核', sub: '自信與盲點掃描' },
                                { id: 'enneagram', label: '5. 九型人格', sub: '核心渴望與恐懼' },
                                { id: 'big5', label: '6. 大五人格', sub: '穩定性與盡責度' },
                                { id: 'holland', label: '7. Holland 職業興趣', sub: '適合的任務型態' }
                                ].map(m => (
                                <div 
                                    key={m.id} 
                                    onClick={() => setModules({...modules, [m.id]: !modules[m.id]})}
                                    className={`p-4 sm:p-5 border rounded-lg cursor-pointer transition-all flex justify-between items-center select-none active:scale-95 ${
                                    modules[m.id] ? 'border-slate-800 bg-slate-50 shadow-sm' : 'border-gray-200 hover:bg-gray-50'
                                    }`}
                                >
                                    <div>
                                        <div className={`font-bold text-sm sm:text-base ${modules[m.id] ? 'text-slate-900' : 'text-slate-500'}`}>{m.label}</div>
                                        <div className="text-xs text-slate-400 mt-1">{m.sub}</div>
                                    </div>
                                    <div className={`w-6 h-6 rounded-full border flex items-center justify-center transition-colors ${modules[m.id] ? 'bg-slate-800 border-slate-800 text-white' : 'border-gray-300 bg-white text-transparent'}`}>
                                        <CheckCircle size={16} fill="currentColor" className="text-slate-800"/>
                                    </div>
                                </div>
                                ))}
                            </div>
                        </div>

                        <button onClick={handleStartQuiz} className="w-full bg-slate-900 text-white font-bold text-lg py-5 rounded-xl hover:bg-slate-800 transition-all shadow-md active:translate-y-1 flex justify-center items-center gap-2">
                            <Play size={20} fill="currentColor"/> 立即開始測驗
                        </button>
                    </div>
                    )}

                    {/* QUIZ VIEW */}
                    {view === 'quiz' && quizConfig && (
                    <QuizRunner 
                        config={quizConfig}
                        candidateInfo={candidateInfo}
                        onComplete={(finalAnswers) => {
                            // 計算測驗總耗時 (秒)
                            const endTime = Date.now();
                            const durationSecs = Math.round((endTime - quizStartTime) / 1000);
                            
                            setAnswers(finalAnswers);
                            setQuizDuration(durationSecs);
                            setView('result'); // 直接跳轉到結果頁
                        }}
                    />
                    )}

                    {/* RESULT VIEW */}
                    {view === 'result' && <ResultDashboard answers={answers} config={quizConfig} candidateInfo={candidateInfo} showToast={showToast} duration={quizDuration} />}

                </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<PersonalityPortal />);
    </script>
</body>
</html>
